<!DOCTYPE html>
<html>
<head>
  <title>SE Calculator</title>


<style>
:root{
  --font-sans:Arial,sans-serif;
  --font-mono:Consolas,monospace;

  --color-text-primary:#111;
  --color-text-secondary:#666;
  --color-text-tertiary:#999;

  --color-background-primary:#fff;
  --color-background-secondary:#f7f7f7;
  --color-background-tertiary:#ececec;

  --color-border-primary:#999;
  --color-border-secondary:#ccc;
  --color-border-tertiary:#e5e5e5;

  --border-radius-md:8px;
  --border-radius-lg:14px;
}


*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);font-size:13px}
.page{padding:1.5rem 0;max-width:85%; margin:auto}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px}
.eye-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.eye-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.eye-dot{width:8px;height:8px;border-radius:50%}
.eye-dot.od{background:#378ADD}
.eye-dot.os{background:#1D9E75}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-wrap{display:flex;flex-direction:column;gap:3px}
.field-label{font-size:11px;color:var(--color-text-tertiary)}
input{width:100%;padding:7px 9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-mono)}
input:focus{outline:none;border-color:var(--color-border-primary)}
.se-line{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)}
.se-val{font-size:15px;font-weight:500;font-family:var(--font-mono)}
.dom-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-tertiary);display:flex;align-items:center;gap:4px}
.dom-btn.active-od{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.dom-btn.active-os{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.controls-row{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end;margin-bottom:16px}
.field-wrap select{width:100%;padding:7px 9px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer}
.calc-btn{padding:8px 20px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.calc-btn:hover{background:var(--color-background-secondary)}
.calc-btn:active{transform:scale(0.98)}
.choice-section{display:none;margin-bottom:16px}
.choice-section.visible{display:block}
.choice-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice-btn{padding:12px 16px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;text-align:left}
.choice-btn:hover{background:var(--color-background-secondary)}
.choice-btn.active-near{border:1.5px solid #5DCAA5;background:#E1F5EE}
.choice-btn.active-far{border:1.5px solid #85B7EB;background:#E6F1FB}
.choice-icon{font-size:18px;margin-bottom:4px}
.choice-main{font-size:13px;font-weight:500}
.choice-main.near{color:#085041}
.choice-main.far{color:#0C447C}
.choice-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.reset-btn{display:none;font-size:12px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;padding:0;margin-top:8px;text-decoration:underline}
.reset-btn.visible{display:inline}
.tbl-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:var(--color-background-secondary);font-size:11px;font-weight:500;color:var(--color-text-secondary);padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary)}
th.center,td.center{text-align:center}
td{padding:8px 10px;font-size:12px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.base-row td{background:var(--color-background-secondary)}
.row-num{color:var(--color-text-tertiary);font-size:11px}
.fn-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.fn-badge.near{background:#E1F5EE;color:#085041}
.fn-badge.far{background:#E6F1FB;color:#0C447C}
.fn-badge.base{background:var(--color-background-tertiary);color:var(--color-text-secondary)}
.rx-val{font-family:var(--font-mono);font-size:12px}
.delta-val{font-size:11px;color:var(--color-text);font-family:var(--font-mono)}
select.rating{width:60px;padding:4px 4px;font-size:11px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
</style>

<div class="page">

<div class="eye-grid">
  <div class="card">
    <div class="eye-label"><span class="eye-dot od"></span> Right eye (OD)</div>
    <div class="field-row">
      <div class="field-wrap"><span class="field-label">Sphere</span><input id="od_s" type="text" placeholder="+0.00"></div>
      <div class="field-wrap"><span class="field-label">Cylinder</span><input id="od_c" type="text" placeholder="-0.00"></div>
    </div>
    <div class="se-line">
      <span style="color:var(--color-text-secondary);font-size:12px">SE <span class="se-val" id="od_se">—</span></span>
      <button class="dom-btn" id="dom_od" onclick="setDominant('od')"><i class="ti ti-eye" aria-hidden="true" style="font-size:11px"></i>Dominant</button>
    </div>
  </div>
  <div class="card">
    <div class="eye-label"><span class="eye-dot os"></span> Left eye (OS)</div>
    <div class="field-row">
      <div class="field-wrap"><span class="field-label">Sphere</span><input id="os_s" type="text" placeholder="+0.00"></div>
      <div class="field-wrap"><span class="field-label">Cylinder</span><input id="os_c" type="text" placeholder="-0.00"></div>
    </div>
    <div class="se-line">
      <span style="color:var(--color-text-secondary);font-size:12px">SE <span class="se-val" id="os_se">—</span></span>
      <button class="dom-btn" id="dom_os" onclick="setDominant('os')"><i class="ti ti-eye" aria-hidden="true" style="font-size:11px"></i>Dominant</button>
    </div>
  </div>
</div>

<div class="controls-row">
  <div class="field-wrap"><span class="field-label">Rx mode</span>
    <select id="mode"><option value="spec">Spectacle</option><option value="cl">Contact lens</option></select>
  </div>
  <div class="field-wrap"><span class="field-label">Current add</span>
    <select id="add"><option value="low">Low — 0 to +1.25</option><option value="mid">Mid — +1.50 to +2.25</option><option value="high">High — +2.50 and above</option></select>
  </div>
  <button class="calc-btn" onclick="calculateSE()"><i class="ti ti-calculator" aria-hidden="true" style="font-size:13px;margin-right:5px"></i>Calculate</button>
</div>

<div class="choice-section" id="choiceSection">
  <div class="choice-label">How is the patient doing?</div>
  <div class="choice-grid">
    <button class="choice-btn" id="btn_near" onclick="showRows('near')">
      <div class="choice-icon"><i class="ti ti-zoom-in" aria-hidden="true" style="color:#1D9E75"></i></div>
      <div class="choice-main near">Improve near</div>
      <div class="choice-sub">Near vision is insufficient</div>
    </button>
    <button class="choice-btn" id="btn_far" onclick="showRows('far')">
      <div class="choice-icon"><i class="ti ti-zoom-out" aria-hidden="true" style="color:#378ADD"></i></div>
      <div class="choice-main far">Improve far</div>
      <div class="choice-sub">Distance vision is blurred</div>
    </button>
  </div>
  <button class="reset-btn" id="resetBtn" onclick="resetChoice()"><i class="ti ti-rotate-clockwise" style="font-size:11px;margin-right:3px"></i>Show all rows</button>
</div>

<div class="tbl-wrap">
<table>
  <thead>
    <tr>
      <th style="width:32px">#</th>
      <th style="width:100px"></th>
      <th style="width:92px">Right RX</th>
      <th style="width:92px">Left RX</th>
      <th>Delta</th>
      <th class="center" style="width:68px">Far</th>
      <th class="center" style="width:68px">Near</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
const rowDefs=[
  {id:0,  fn:"Base",  group:"base", delta:"BASE +0.00 // +0.00",           od:0,    os:0,    addOD:0,  addOS:0,  domHide:null},
  {id:1,  fn:"near",  group:"near", delta:"NEAR:1 +0.25 // +0.25",           od:.25,  os:.25,  addOD:0,  addOS:0,  domHide:null},
    {id:2, fn:"near",  group:"near", delta:"NEAR:2 +0.00 +add // +0.00",      od:0,    os:0,    addOD:+1, addOS:0,  domHide:"od"},
  {id:3, fn:"near",  group:"near", delta:"NEAR:2 +0.00 // +0.00 +add",      od:0,    os:0,    addOD:0,  addOS:+1, domHide:"os"},
{id:4, fn:"near",  group:"near", delta:"NEAR:3 +0.00 +add // +0.00 +add", od:0,    os:0,    addOD:+1, addOS:+1, domHide:null},
  {id:5, fn:"far",   group:"far",  delta:"FAR:1 -0.25 // -0.25",           od:-.25, os:-.25, addOD:0,  addOS:0,  domHide:null},
  {id:6, fn:"far",   group:"far",  delta:"FAR:2 -0.00 -add // -0.00",      od:0,    os:0,    addOD:-1, addOS:0,  domHide:"os"},
  {id:7, fn:"far",   group:"far",  delta:"FAR:2 -0.00 // -0.00 -add",      od:0,    os:0,    addOD:0,  addOS:-1, domHide:"od"},
  {id:8, fn:"far",  group:"far", delta:"FAR:3 +0.25 -add // +0.25 -add",      od:+.25,    os:+.25,    addOD:-1, addOS:-1,  domHide:"null"},

];

const ratingOpts='<option value="na">—</option>'+[1,2,3,4,5,6,7,8,9].map(n=>`<option>${n}</option>`).join('');
const tbody=document.getElementById('tableBody');

rowDefs.forEach(r=>{
  const tr=document.createElement('tr');
  tr.id=`row_${r.id}`;
  if(r.group==='base') tr.className='base-row';
  const bc=r.group==='base'?'base':r.fn==='near'?'near':'far';
  const bl=r.group==='base'?'Baseline':r.fn==='near'?'Improve near':'Improve far';
  tr.innerHTML=`<td class="row-num center">${r.id}</td><td><span class="fn-badge ${bc}">${bl}</span></td><td><span class="rx-val" id="r${r.id}_od">—</span></td><td><span class="rx-val" id="r${r.id}_os">—</span></td><td><span class="delta-val">${r.delta}</span></td><td class="center"><select class="rating" id="r${r.id}_far">${ratingOpts}</select></td><td class="center"><select class="rating" id="r${r.id}_near">${ratingOpts}</select></td>`;
  tbody.appendChild(tr);
});

let dominantEye=null;
let activeGroup=null;
const BVD=0.012;

function setDominant(eye){
  dominantEye=dominantEye===eye?null:eye;
  document.getElementById('dom_od').className='dom-btn'+(dominantEye==='od'?' active-od':'');
  document.getElementById('dom_os').className='dom-btn'+(dominantEye==='os'?' active-os':'');
  applyVisibility();
}

function fmt(v){return(v>=0?'+':'')+v.toFixed(2)}
function roundQ(v){return Math.round(v*4)/4}
function vc(F,d){return F/(1-d*F)}
function clean(v){let n=parseFloat(String(v).replace('+',''));return isNaN(n)?0:n}

function processEye(s,c,mode){
  let flat=mode==='cl'?s:vc(s,BVD);
  let steep=mode==='cl'?s+c:vc(s+c,BVD);
  return roundQ((flat+steep)/2);
}

function getAddLevel(){
  const v=document.getElementById('add').value;
  return v==='high'?2:v==='mid'?1:0;
}

function labelFromLevel(l){return l===2?'Hi':l===1?'Med':l===0?'Lo':''}

function applyAddDelta(base,delta){
  if(delta===0) return base;
  if(delta===+1) return base===2?2:base+1;
  if(delta===-1) return base===0?-1:base-1;
  return base;
}

function applyVisibility(){
  rowDefs.forEach(r=>{
    const tr=document.getElementById(`row_${r.id}`);
    const hiddenByGroup = activeGroup!==null && r.group!=='base' && r.group!==activeGroup;
    const hiddenByDom   = dominantEye!==null && r.domHide===dominantEye;
    tr.style.display=(hiddenByGroup||hiddenByDom)?'none':'';
  });
}

function calculateSE(){
  const mode=document.getElementById('mode').value;
  const baseOD=processEye(clean(document.getElementById('od_s').value),clean(document.getElementById('od_c').value),mode);
  const baseOS=processEye(clean(document.getElementById('os_s').value),clean(document.getElementById('os_c').value),mode);
  const baseAdd=getAddLevel();

  document.getElementById('od_se').textContent=fmt(baseOD);
  document.getElementById('os_se').textContent=fmt(baseOS);

  rowDefs.forEach(r=>{
    const odVal=baseOD+r.od;
    const osVal=baseOS+r.os;
    const odAddLevel=applyAddDelta(baseAdd,r.addOD);
    const osAddLevel=applyAddDelta(baseAdd,r.addOS);
    const odAdd=odAddLevel===-1?'':labelFromLevel(odAddLevel);
    const osAdd=osAddLevel===-1?'':labelFromLevel(osAddLevel);
    document.getElementById(`r${r.id}_od`).textContent=`${fmt(odVal)}${odAdd?' '+odAdd:''}`;
    document.getElementById(`r${r.id}_os`).textContent=`${fmt(osVal)}${osAdd?' '+osAdd:''}`;
  });

  document.getElementById('choiceSection').classList.add('visible');
  activeGroup=null;
  document.getElementById('btn_near').className='choice-btn';
  document.getElementById('btn_far').className='choice-btn';
  document.getElementById('resetBtn').classList.remove('visible');
  applyVisibility();
}

function showRows(group){
  activeGroup=group;
  document.getElementById('btn_near').className='choice-btn'+(group==='near'?' active-near':'');
  document.getElementById('btn_far').className='choice-btn'+(group==='far'?' active-far':'');
  document.getElementById('resetBtn').classList.add('visible');
  applyVisibility();
}

function resetChoice(){
  activeGroup=null;
  document.getElementById('btn_near').className='choice-btn';
  document.getElementById('btn_far').className='choice-btn';
  document.getElementById('resetBtn').classList.remove('visible');
  applyVisibility();
}
</script>


</body>
</html>
